<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>JustStreamIt</title>
        <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200;300;400;500;600&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="style.css">
        <script src="script.js" defer></script>
    </head>
    <body>
        <div id="modal"></div>
        <!-- HEADER -->
        <header class="header">
            <img src="images/logo.png" alt="logo">
            <h3 class="text">Videos on demand</h3>
        </header>

        <!-- Best movie --> 
        <section class="category best-movie">
            <h2 class="text">Best movie</h2>
            <article id="big-movie-box">
                <img src="data:," alt="movie-image">
                <div class="movie-info">
                    <h2 class="text title">Title</h2>
                    <p class="short-description text"></p>
                    <button class="text btn-details">Details</button>
                </div>
            </article>
        </section>

        <!-- Films les mieux notés  -->
        <section class="category top-rated" id="top_rated">
            <h2 class="text">Top-rated movies</h2>
            <div class="movie-list"> </div>
            <button class="btn-see-more text">See more</button>
        </section>

        <!-- Mystery -->
        <section class="category genre" id="mystery">
            <h2 class="text">Mystery</h2>
            <div class="movie-list"> </div>
            <button class="btn-see-more text">See more</button>
        </section>

        <!-- Science fiction -->
        <section class="category genre" id="sci-fi">
            <h2 class="text">Science fiction</h2>
            <div class="movie-list"> </div>
            <button class="btn-see-more text">See more</button>
        </section>

        <!-- Autres -->
        <section class="category genre others">
            <div class="name">
                <h2 class="text">Others:</h2>
                <select class="select text">
                    <option value="Action" selected >Action</option>
                    <option value="Adult">Adult</option>
                    <option value="Adventure">Adventure</option>
                    <option value="Animation">Animation</option>
                    <option value="Biography">Biography</option>
                    <option value="Comedy">Comedy</option>
                    <option value="Crime">Crime</option>
                    <option value="Documentary">Documentary</option>
                    <option value="Drama">Drama</option>
                    <option value="Family">Family</option>
                    <option value="Fantasy">Fantasy</option>
                    <option value="Film-Noir">Film-Noir</option>
                    <option value="History">History</option>
                    <option value="Horror">Horror</option>
                    <option value="Music">Music</option>
                    <option value="Musical">Musical</option>
                    <option value="Mystery">Mystery</option>
                    <option value="News">News</option>
                    <option value="Reality-TV">Reality-TV</option>
                    <option value="Romance">Romance</option>
                    <option value="Sci-Fi">Sci-Fi</option>
                    <option value="Sport">Sport</option>
                    <option value="Thriller">Thriller</option>
                    <option value="War">War</option>
                    <option value="Western">Westerns</option>
                </select>
            </div>
            <div class="movie-list"> </div>
            <button class="btn-see-more text">See more</button>
        </section>

        <!-- Others --> 
        <section class="category genre others">
            <div class="name">
                <h2 class="text">Others:</h2>
                <select class="select text">
                    <option value="Action">Action</option>
                    <option value="Adult" selected>Adult</option>
                    <option value="Adventure">Adventure</option>
                    <option value="Animation">Animation</option>
                    <option value="Biography">Biography</option>
                    <option value="Comedy">Comedy</option>
                    <option value="Crime">Crime</option>
                    <option value="Documentary">Documentary</option>
                    <option value="Drama">Drama</option>
                    <option value="Family">Family</option>
                    <option value="Fantasy">Fantasy</option>
                    <option value="Film-Noir">Film-Noir</option>
                    <option value="History">History</option>
                    <option value="Horror">Horror</option>
                    <option value="Music">Music</option>
                    <option value="Musical">Musical</option>
                    <option value="Mystery">Mystery</option>
                    <option value="News">News</option>
                    <option value="Reality-TV">Reality-TV</option>
                    <option value="Romance">Romance</option>
                    <option value="Sci-Fi">Sci-Fi</option>
                    <option value="Sport">Sport</option>
                    <option value="Thriller">Thriller</option>
                    <option value="War">War</option>
                    <option value="Western">Westerns</option>
                </select>
            </div>
            <div class="movie-list"> </div>
            <button class="btn-see-more text">See more</button>
        </section>
        
    </body>
</html>
